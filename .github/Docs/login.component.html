<div class="login-container">
  <div class="card shadow-lg border-0">
    <div class="card-header bg-primary text-white text-center py-4">
      <h2 class="mb-0 fw-bold">TallerNova</h2>
      <p class="mb-0 opacity-75">Control de Conciliaciones</p>
    </div>
    <div class="card-body p-4">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="email" class="form-label text-secondary small fw-bold">EMAIL</label>
          <input
            type="email"
            formControlName="email"
            class="form-control form-control-lg"
            [ngClass]="{ 'is-invalid': submitted && form['email'].errors }"
            id="email"
            placeholder="nombre@empresa.com"
          />
          <div *ngIf="submitted && form['email'].errors" class="invalid-feedback">
            <span *ngIf="form['email'].errors['required']">El email es obligatorio</span>
            <span *ngIf="form['email'].errors['email']">Formato de email inválido</span>
          </div>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label text-secondary small fw-bold">CONTRASEÑA</label>
          <input
            type="password"
            formControlName="password"
            class="form-control form-control-lg"
            [ngClass]="{ 'is-invalid': submitted && form['password'].errors }"
            id="password"
            placeholder="••••••••"
          />
          <div *ngIf="submitted && form['password'].errors" class="invalid-feedback">
            <span *ngIf="form['password'].errors['required']">La contraseña es obligatoria</span>
            <span *ngIf="form['password'].errors['minlength']">Mínimo 6 caracteres</span>
          </div>
        </div>

        <div *ngIf="error" class="alert alert-danger d-flex align-items-center mb-4" role="alert">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <div>{{ error }}</div>
        </div>

        <div class="d-grid gap-2">
          <button [disabled]="loading" class="btn btn-primary btn-lg fw-bold py-3 shadow-sm">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            {{ loading ? 'Iniciando sesión...' : 'ENTRAR' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
