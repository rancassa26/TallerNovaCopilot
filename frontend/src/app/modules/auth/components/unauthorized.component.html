<div class="unauthorized-container">
  <div class="card shadow-lg border-0 text-center p-5">
    <div class="card-header bg-transparent border-0">
      <div class="icon-wrapper mb-4">
        <i class="bi bi-shield-slash-fill text-danger display-1"></i>
      </div>
      <h2 class="fw-bold text-dark">Acceso Restringido</h2>
    </div>
    <div class="card-body">
      <p class="lead text-secondary mb-4">
        Lo sentimos, tu cuenta no cuenta con los privilegios de <strong>Administrador</strong> necesarios para acceder a esta sección.
      </p>
      <p class="text-muted mb-5">
        Si crees que esto es un error, por favor contacta con el equipo de soporte técnico o con tu supervisor contable.
      </p>
      <div class="d-grid gap-3">
        <button (click)="goToDashboard()" class="btn btn-primary btn-lg shadow-sm">
          <i class="bi bi-house-door me-2"></i>Volver al Dashboard
        </button>
        <button (click)="logout()" class="btn btn-link text-muted text-decoration-none">Cerrar sesión e intentar con otra cuenta</button>
      </div>
    </div>
  </div>
</div>
